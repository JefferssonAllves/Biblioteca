<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barra de Pesquisa com Sugestões</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    .search-container {
      position: relative;
      width: 300px;
    }

    .search-box {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background-color: white;
      border: 1px solid #ccc;
      border-top: none;
      border-radius: 5px;
      box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
      max-height: 200px;
      overflow-y: auto;
      z-index: 10;
      display: none;
    }

    .suggestions div {
      padding: 8px;
      cursor: pointer;
    }

    .suggestions div:hover {
      background-color: #f0f0f0;
    }
  </style>
</head>

<body>

  <div class="search-container">
    <input type="text" class="search-box" id="searchInput" placeholder="Pesquise algo..." oninput="showSuggestions()">
    <div id="suggestions" class="suggestions"></div>
  </div>

  <script>
    const suggestionsList = [
      "Banana",
      "Maçã",
      "Laranja",
      "Morango",
      "Uva",
      "Manga",
      "Cabelos",
      "Cabeludo",
      "Calçado",
      "Cachorro",
    ];

    function showSuggestions() {
      const input = document.getElementById('searchInput');
      const suggestionsContainer = document.getElementById('suggestions');
      const query = input.value.toLowerCase();

      // Limpa as sugestões anteriores
      // Se não houver nada digitado, esconde as sugestões
      if (query === "") {
        suggestionsContainer.style.display = "none";
        return;
      }

      // Filtra as sugestões baseadas na pesquisa
      const filteredSuggestions = suggestionsList.filter(item =>
        item.toLowerCase().includes(query)
      );

      // Se não houver sugestões, esconde a lista
      if (filteredSuggestions.length === 0) {
        suggestionsContainer.style.display = "none";
      } else {
        suggestionsContainer.style.display = "block";
        suggestionsContainer.innerHTML = filteredSuggestions.map(item =>
          `<div onclick="selectSuggestion('${item}')">${item}</div>`
        ).join('');
      }
    }

    function selectSuggestion(suggestion) {
      document.getElementById('searchInput').value = suggestion;
      document.getElementById('suggestions').style.display = "none";
    }
  </script>

</body>

</html>
